<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RecoEngine — Smart Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:   #0d0f18;
    --card:   #161824;
    --card2:  #1e2130;
    --border: #252840;
    --acc1:   #5b8dee;
    --acc2:   #f0a45a;
    --acc3:   #52e8a0;
    --acc4:   #f05a7a;
    --txt:    #dde1f5;
    --muted:  #6b6f8e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--txt);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(91,141,238,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,141,238,.04) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* ── layout ── */
  .page { position: relative; z-index: 1; display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  header {
    display: flex; align-items: center; gap: 14px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(13,15,24,.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--acc1), var(--acc3)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-weight: 700; color: var(--dark); font-size: 16px; flex-shrink: 0; }
  .logo-name { font-family: 'Space Mono', monospace; font-size: 15px; }
  .logo-name span { color: var(--acc1); }
  .header-stats { margin-left: auto; display: flex; gap: 20px; }
  .hstat { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .hstat b { color: var(--txt); }

  .main { display: grid; grid-template-columns: 1fr 340px; gap: 0; height: calc(100vh - 57px); overflow: hidden; }

  /* ── catalog panel ── */
  .catalog { display: flex; flex-direction: column; overflow: hidden; border-right: 1px solid var(--border); }
  .catalog-toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input {
    width: 100%;
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--txt);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 9px 14px 9px 36px; outline: none;
    transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--acc1); }
  .search-wrap .ico { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
  .cat-filter {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--txt);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    padding: 9px 12px; outline: none; cursor: pointer;
    transition: border-color .2s;
  }
  .cat-filter:focus { border-color: var(--acc1); }
  .cat-filter option { background: var(--card); }

  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 16px 20px; overflow-y: auto; flex: 1; }

  .prod-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    transition: border-color .2s, transform .15s;
    animation: pop .25s ease both;
  }
  .prod-card:hover { border-color: var(--acc1); transform: translateY(-2px); }
  .prod-card.in-cart { border-color: var(--acc3); background: rgba(82,232,160,.05); }

  @keyframes pop { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }

  .prod-cat { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .prod-name { font-size: 13px; font-weight: 600; line-height: 1.35; flex: 1; }
  .prod-price { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--acc2); }
  .add-btn {
    margin-top: 4px;
    background: rgba(91,141,238,.12); border: 1px solid rgba(91,141,238,.3);
    border-radius: 7px; color: var(--acc1);
    font-family: 'Space Mono', monospace; font-size: 11px;
    padding: 7px; cursor: pointer; text-align: center;
    transition: all .18s;
  }
  .add-btn:hover { background: rgba(91,141,238,.22); }
  .add-btn.remove { background: rgba(82,232,160,.1); border-color: rgba(82,232,160,.35); color: var(--acc3); }
  .add-btn.remove:hover { background: rgba(240,90,122,.12); border-color: rgba(240,90,122,.35); color: var(--acc4); }

  /* ── right sidebar ── */
  .sidebar { display: flex; flex-direction: column; overflow: hidden; }

  /* Cart section */
  .cart-section { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); flex-shrink: 0; max-height: 45vh; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--border);
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: .07em; flex-shrink: 0;
  }
  .cart-badge {
    background: var(--acc1); color: var(--dark);
    border-radius: 10px; padding: 2px 8px;
    font-size: 10px; font-weight: 700;
  }
  .cart-items { overflow-y: auto; flex: 1; padding: 8px 0; }
  .cart-empty { padding: 28px 18px; text-align: center; color: var(--muted); font-size: 13px; line-height: 1.6; }
  .cart-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px;
    border-bottom: 1px solid rgba(37,40,64,.5);
    animation: slideIn .2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
  .ci-dot { width: 7px; height: 7px; background: var(--acc3); border-radius: 50%; flex-shrink: 0; }
  .ci-info { flex: 1; min-width: 0; }
  .ci-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-cat  { font-size: 10px; color: var(--muted); }
  .ci-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 4px; transition: color .15s; flex-shrink: 0; }
  .ci-remove:hover { color: var(--acc4); }

  .rec-btn {
    margin: 10px 18px 14px;
    background: linear-gradient(135deg, var(--acc1), #4070d0);
    border: none; border-radius: 9px; color: #fff;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
    padding: 12px; cursor: pointer; letter-spacing: .04em;
    transition: opacity .2s, transform .15s;
  }
  .rec-btn:hover { opacity: .9; transform: translateY(-1px); }
  .rec-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  /* Recs section */
  .recs-section { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  .recs-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .recs-placeholder { padding: 32px 18px; text-align: center; color: var(--muted); font-size: 12px; line-height: 1.8; }
  .recs-placeholder .icon { font-size: 28px; margin-bottom: 10px; opacity: .4; }

  .rec-item {
    padding: 10px 18px;
    border-bottom: 1px solid rgba(37,40,64,.5);
    animation: pop .25s ease both;
  }
  .rec-item:hover { background: rgba(91,141,238,.04); }
  .rec-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 5px; }
  .rec-name { font-size: 12px; font-weight: 600; line-height: 1.3; }
  .rec-price-sm { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--acc2); flex-shrink: 0; }
  .rec-meta-row { display: flex; align-items: center; gap: 8px; }
  .rec-cat-chip { font-size: 10px; color: var(--muted); background: var(--card2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; }
  .sim-bar-wrap { flex: 1; display: flex; align-items: center; gap: 6px; }
  .sim-bar-bg { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .sim-bar-fill { height: 100%; background: linear-gradient(90deg, var(--acc3), var(--acc1)); border-radius: 2px; transition: width .5s ease; }
  .sim-val { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--acc3); flex-shrink: 0; }

  .add-from-rec {
    margin-top: 6px;
    background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    font-size: 10px; padding: 4px 10px; cursor: pointer;
    transition: all .15s;
  }
  .add-from-rec:hover { border-color: var(--acc1); color: var(--acc1); }

  .spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--acc1); border-radius: 50%; animation: spin .6s linear infinite; margin: 30px auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* no results */
  .no-results { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }

  @media (max-width: 800px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; height: auto; }
    .catalog { height: 60vh; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar { height: auto; max-height: 80vh; }
    .header-stats { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header>
    <div class="logo">R</div>
    <div class="logo-name">Reco<span>Engine</span></div>
    <div class="header-stats">
      <div class="hstat">Products <b id="h-products">—</b></div>
      <div class="hstat">Categories <b id="h-cats">—</b></div>
      <div class="hstat">Matrix Density <b id="h-density">—</b></div>
    </div>
  </header>

  <div class="main">

    <!-- ── Catalog ── -->
    <div class="catalog">
      <div class="catalog-toolbar">
        <div class="search-wrap">
          <span class="ico">🔍</span>
          <input type="text" id="search-input" placeholder="Search products…" oninput="filterProducts()">
        </div>
        <select class="cat-filter" id="cat-filter" onchange="filterProducts()">
          <option value="">All categories</option>
          {% for c in categories %}
          <option value="{{ c }}">{{ c }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="product-grid" id="product-grid"></div>
    </div>

    <!-- ── Sidebar ── -->
    <div class="sidebar">

      <!-- Cart -->
      <div class="cart-section">
        <div class="section-head">
          🛒 Cart
          <span class="cart-badge" id="cart-count">0</span>
        </div>
        <div class="cart-items" id="cart-items">
          <div class="cart-empty">Add products from the catalog<br>to get recommendations.</div>
        </div>
        <button class="rec-btn" id="rec-btn" onclick="getRecommendations()" disabled>
          ✦ Recommend for Me
        </button>
      </div>

      <!-- Recommendations -->
      <div class="recs-section">
        <div class="section-head">✦ Recommendations</div>
        <div class="recs-list" id="recs-list">
          <div class="recs-placeholder">
            <div class="icon">🎯</div>
            Add items to your cart,<br>then click <b>Recommend for Me</b>.<br><br>
            The model uses <b>Item-CF</b> similarity<br>to find what goes well with<br>your cart items.
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  // ── Seed data from Flask ──────────────────────────────────
  const ALL_PRODUCTS = {{ products | tojson }};
  let cart = [];   // array of product_id ints

  // ── Load stats ────────────────────────────────────────────
  fetch('/api/stats').then(r => r.json()).then(d => {
    if (d.error) return;
    document.getElementById('h-products').textContent = d.n_products;
    document.getElementById('h-cats').textContent     = d.categories;
    document.getElementById('h-density').textContent  = d.density + '%';
  });

  // ── Render catalog ────────────────────────────────────────
  function filterProducts() {
    const q   = document.getElementById('search-input').value.toLowerCase();
    const cat = document.getElementById('cat-filter').value;
    const filtered = ALL_PRODUCTS.filter(p =>
      (!q   || p.product_name.toLowerCase().includes(q)) &&
      (!cat || p.category === cat)
    );
    renderGrid(filtered);
  }

  function renderGrid(products) {
    const grid = document.getElementById('product-grid');
    if (!products.length) {
      grid.innerHTML = '<div class="no-results">No products match your search.</div>';
      return;
    }
    grid.innerHTML = products.map(p => {
      const inCart = cart.includes(p.product_id);
      return `
        <div class="prod-card ${inCart ? 'in-cart' : ''}" id="pcard-${p.product_id}">
          <div class="prod-cat">${p.category}</div>
          <div class="prod-name">${p.product_name}</div>
          <div class="prod-price">$${p.price.toFixed(2)}</div>
          <button class="add-btn ${inCart ? 'remove' : ''}" onclick="toggleCart(${p.product_id})">
            ${inCart ? '✓ In Cart — Remove' : '+ Add to Cart'}
          </button>
        </div>`;
    }).join('');
  }

  // ── Cart logic ────────────────────────────────────────────
  function toggleCart(pid) {
    const idx = cart.indexOf(pid);
    if (idx === -1) cart.push(pid);
    else cart.splice(idx, 1);
    renderCartPanel();
    filterProducts();   // refresh card states
    document.getElementById('rec-btn').disabled = cart.length === 0;
  }

  function removeFromCart(pid) {
    cart = cart.filter(id => id !== pid);
    renderCartPanel();
    filterProducts();
    document.getElementById('rec-btn').disabled = cart.length === 0;
  }

  function renderCartPanel() {
    const panel = document.getElementById('cart-items');
    document.getElementById('cart-count').textContent = cart.length;

    if (!cart.length) {
      panel.innerHTML = '<div class="cart-empty">Add products from the catalog<br>to get recommendations.</div>';
      return;
    }

    panel.innerHTML = cart.map(pid => {
      const p = ALL_PRODUCTS.find(x => x.product_id === pid);
      if (!p) return '';
      return `
        <div class="cart-item">
          <div class="ci-dot"></div>
          <div class="ci-info">
            <div class="ci-name" title="${p.product_name}">${p.product_name}</div>
            <div class="ci-cat">${p.category} · $${p.price.toFixed(2)}</div>
          </div>
          <button class="ci-remove" onclick="removeFromCart(${pid})" title="Remove">✕</button>
        </div>`;
    }).join('');
  }

  // ── Recommendations ───────────────────────────────────────
  function getRecommendations() {
    if (!cart.length) return;
    const btn  = document.getElementById('rec-btn');
    const list = document.getElementById('recs-list');

    btn.disabled = true;
    btn.textContent = 'Thinking…';
    list.innerHTML  = '<div class="spinner"></div>';

    fetch('/api/recommend-from-cart', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ cart, top_n: 10 })
    })
    .then(r => r.json())
    .then(data => {
      btn.disabled    = false;
      btn.textContent = '✦ Recommend for Me';
      if (data.error) { list.innerHTML = `<div class="recs-placeholder">${data.error}</div>`; return; }
      renderRecs(data.recommendations);
    })
    .catch(() => {
      btn.disabled    = false;
      btn.textContent = '✦ Recommend for Me';
      list.innerHTML  = '<div class="recs-placeholder">Request failed. Is Flask running?</div>';
    });
  }

  function renderRecs(recs) {
    const list = document.getElementById('recs-list');
    if (!recs.length) {
      list.innerHTML = '<div class="recs-placeholder">No recommendations found. Try adding more items.</div>';
      return;
    }

    const maxSim = Math.max(...recs.map(r => r.similarity), 0.0001);
    list.innerHTML = recs.map((r, i) => {
      const pct = Math.round((r.similarity / maxSim) * 100);
      return `
        <div class="rec-item" style="animation-delay:${i * 35}ms">
          <div class="rec-top">
            <div class="rec-name">${r.product}</div>
            <div class="rec-price-sm">$${r.price.toFixed(2)}</div>
          </div>
          <div class="rec-meta-row">
            <span class="rec-cat-chip">${r.category}</span>
            <div class="sim-bar-wrap">
              <div class="sim-bar-bg"><div class="sim-bar-fill" style="width:${pct}%"></div></div>
              <span class="sim-val">${(r.similarity * 100).toFixed(1)}%</span>
            </div>
          </div>
          <button class="add-from-rec" onclick="toggleCart(${r.product_id})">+ Add to cart</button>
        </div>`;
    }).join('');
  }

  // ── Init ──────────────────────────────────────────────────
  renderGrid(ALL_PRODUCTS);
</script>
</body>
</html>
